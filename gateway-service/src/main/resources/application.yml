server:
  port: 8080
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: gateway-service
  cloud:
    compatibility-verifier:
      enabled: false

  # -------------------------------------------------------------------------
  # Spring Cloud Gateway
  # -------------------------------------------------------------------------
  cloud:
    gateway:
      # YAML-defined routes (programmatic routes in GatewayConfig.java take
      # precedence for complex filter chains; these cover the same paths as a
      # declarative reference and for any routes not overridden programmatically)
      routes:
        # Control Plane – generation tasks (300 s timeout, Requirement 9.4)
        - id: control-plane-generation-yaml
          uri: ${CONTROL_PLANE_URL:http://localhost:8058}
          predicates:
            - Path=/api/tasks/generate/**,/api/generate/**,/api/backend-generate/**,/api/fullstack-generate/**
          filters:
            - AddRequestHeader=X-Gateway-Source, spring-cloud-gateway
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@clientIpKeyResolver}"

        # Control Plane – standard API (30 s timeout, Requirement 9.4)
        - id: control-plane-api-yaml
          uri: ${CONTROL_PLANE_URL:http://localhost:8058}
          predicates:
            - Path=/api/**
          filters:
            - AddRequestHeader=X-Gateway-Source, spring-cloud-gateway
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@clientIpKeyResolver}"

        # Control Plane – WebSocket
        - id: control-plane-ws-yaml
          uri: ${CONTROL_PLANE_WS_URL:ws://localhost:8058}
          predicates:
            - Path=/ws/**
          filters:
            - AddRequestHeader=X-Gateway-Source, spring-cloud-gateway

        # Control Plane – Actuator / management
        - id: control-plane-actuator-yaml
          uri: ${CONTROL_PLANE_URL:http://localhost:8058}
          predicates:
            - Path=/actuator/**
          filters:
            - AddRequestHeader=X-Gateway-Source, spring-cloud-gateway

        # Artifact short-links
        - id: artifact-shortlinks-yaml
          uri: ${CONTROL_PLANE_URL:http://localhost:8058}
          predicates:
            - Path=/s/**
          filters:
            - AddRequestHeader=X-Gateway-Source, spring-cloud-gateway

        # Java Sandbox (Requirement 9.2)
        - id: java-sandbox-yaml
          uri: ${JAVA_SANDBOX_URL:http://localhost:18080}
          predicates:
            - Path=/sandbox/**
          filters:
            - AddRequestHeader=X-Gateway-Source, spring-cloud-gateway
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@clientIpKeyResolver}"

        # Static content
        - id: static-content-yaml
          uri: ${STATIC_CONTENT_URL:http://localhost:8058}
          predicates:
            - Path=/static/**,/assets/**
          filters:
            - AddRequestHeader=X-Gateway-Source, spring-cloud-gateway
            - AddResponseHeader=Cache-Control, public, max-age=3600

      # Global HTTP client settings
      httpclient:
        # Connection establishment timeout
        connect-timeout: 10000
        # Default response timeout for non-generation routes (30 s, Requirement 9.4)
        # Generation routes override this via TimeoutFilter
        response-timeout: 30s
        pool:
          max-connections: 500
          acquire-timeout: 5000

      # Global filters applied to every route
      default-filters:
        - AddResponseHeader=X-Gateway-Response, spring-cloud-gateway
        - AddResponseHeader=X-Content-Type-Options, nosniff
        - AddResponseHeader=X-Frame-Options, DENY

  # -------------------------------------------------------------------------
  # Redis – used by RateLimitingFilter and Spring's RequestRateLimiter
  # -------------------------------------------------------------------------
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:changeme}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2

# -------------------------------------------------------------------------
# Management / Actuator
# -------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
    gateway:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.75, 0.95, 0.99

# -------------------------------------------------------------------------
# Gateway-specific upstream URLs (also used by GatewayHealthIndicator)
# -------------------------------------------------------------------------
gateway:
  upstream:
    control-plane:
      url: ${CONTROL_PLANE_URL:http://localhost:8058}
    java-sandbox:
      url: ${JAVA_SANDBOX_URL:http://localhost:18080}
    static-content:
      url: ${STATIC_CONTENT_URL:http://localhost:8058}

# -------------------------------------------------------------------------
# Logging
# -------------------------------------------------------------------------
logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.autocode.gateway: DEBUG
    reactor.netty: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [traceId=%X{traceId}] %logger{36} - %msg%n"
