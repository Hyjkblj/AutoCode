global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090
        labels:
          service: prometheus

  - job_name: control-plane
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - control-plane:8058
        labels:
          service: control-plane

  - job_name: gateway-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - gateway-service:8080
        labels:
          service: gateway-service

  - job_name: approval-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - approval-service:8064
        labels:
          service: approval-service

  - job_name: artifact-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - artifact-service:8081
        labels:
          service: artifact-service

  - job_name: event-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - event-service:8082
        labels:
          service: event-service

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093
        labels:
          service: alertmanager

  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets:
          - grafana:3000
        labels:
          service: grafana
