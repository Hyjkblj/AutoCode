spring:
  datasource:
    url: ${APPROVAL_DB_URL}
    username: ${APPROVAL_DB_USER}
    password: ${APPROVAL_DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000

approval:
  default-timeout-seconds: 300
  max-timeout-seconds: 3600
  audit-enabled: true
  control-plane-url: ${CONTROL_PLANE_URL}

logging:
  level:
    com.autocode.approval: WARN
    org.springframework.web: WARN
    org.hibernate.SQL: ERROR
