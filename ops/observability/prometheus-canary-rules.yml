groups:
  - name: autocode-canary
    rules:
      # CanaryErrorRateSpike: fires when the canary's error rate exceeds the
      # stable baseline by more than 2 percentage points for 2 minutes.
      - alert: CanaryErrorRateSpike
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{deployment="canary",status=~"5.."}[2m]))
            /
            clamp_min(sum(rate(http_server_requests_seconds_count{deployment="canary"}[2m])), 1)
          )
          -
          (
            sum(rate(http_server_requests_seconds_count{deployment="stable",status=~"5.."}[2m]))
            /
            clamp_min(sum(rate(http_server_requests_seconds_count{deployment="stable"}[2m])), 1)
          )
          > 0.02
        for: 2m
        labels:
          severity: critical
          service: canary
        annotations:
          summary: Canary error rate spike detected
          description: >
            Canary error rate exceeds stable baseline by more than 2%.
            Canary error rate: {{ $value | humanizePercentage }} above baseline.
            Consider rolling back the canary deployment.

      # CanaryLatencySpike: fires when the canary's P95 latency exceeds
      # 1.5× the stable baseline P95 latency for 2 minutes.
      - alert: CanaryLatencySpike
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(http_server_requests_seconds_bucket{deployment="canary"}[2m]))
          )
          /
          clamp_min(
            histogram_quantile(
              0.95,
              sum by (le) (rate(http_server_requests_seconds_bucket{deployment="stable"}[2m]))
            ),
            0.001
          )
          > 1.5
        for: 2m
        labels:
          severity: critical
          service: canary
        annotations:
          summary: Canary P95 latency spike detected
          description: >
            Canary P95 latency is more than 1.5× the stable baseline P95 latency.
            Ratio: {{ $value }}.
            Consider rolling back the canary deployment.
