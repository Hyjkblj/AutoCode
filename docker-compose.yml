services:
  mysql:
    image: mysql:8.4
    container_name: mvp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: mvp_codeops
      MYSQL_USER: mvp
      MYSQL_PASSWORD: ${MVP_DB_PASSWORD:-changeme}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD:-changeme} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4
    container_name: mvp-redis
    command: ["redis-server", "--requirepass", "${MVP_REDIS_PASSWORD:-changeme}"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${MVP_REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  control-plane:
    profiles: ["fullstack"]
    build:
      context: .
      dockerfile: control-plane-spring/Dockerfile
    container_name: mvp-control-plane
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MVP_DB_URL: jdbc:mysql://mysql:3306/mvp_codeops?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
      MVP_DB_USERNAME: root
      MVP_DB_PASSWORD: ${MVP_DB_PASSWORD:-changeme}
      MVP_REDIS_HOST: redis
      MVP_REDIS_PORT: "6379"
      MVP_REDIS_PASSWORD: ${MVP_REDIS_PASSWORD:-changeme}
      MVP_AUTH_MODE: jwt
      MVP_JWT_SECRET: ${MVP_JWT_SECRET:-your-jwt-secret-at-least-32-bytes-long}
      MVP_ELEVATED_AUTHORITIES: ROLE_ADMIN,ROLE_OPERATOR
      MVP_MTLS_REQUIRED_FOR_AGENT: "false"
      MVP_ARTIFACTS_BASE_DIR: /app/data/artifacts
      MVP_ARTIFACTS_HOSTING_BASE_DIR: /app/data/artifacts-hosted
      MVP_ARTIFACTS_HOSTING_PUBLIC_BASE_URL: ${MVP_ARTIFACTS_HOSTING_PUBLIC_BASE_URL:-}
      MVP_ARTIFACTS_DOWNLOAD_SHARED_TOKEN: ${MVP_ARTIFACTS_DOWNLOAD_SHARED_TOKEN:-}
    ports:
      - "8058:8058"
    volumes:
      - control-plane-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8058/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20

  pc-agent-java:
    profiles: ["fullstack"]
    build:
      context: .
      dockerfile: pc-agent-java/Dockerfile
    container_name: mvp-pc-agent-java
    depends_on:
      control-plane:
        condition: service_healthy
    environment:
      MVP_BASE_URL: http://control-plane:8058
      MVP_AGENT_TOKEN: agent-dev-token
      MVP_NODE_ID: java-sandbox-local
      MVP_AGENT_PROFILE: coder
      MVP_ALLOWED_WORKSPACE_PREFIXES: /workspace
      MVP_SANDBOX_SERVER_ENABLED: "true"
      MVP_SANDBOX_PORT: "18080"
    volumes:
      - ./:/workspace

  python-agent:
    profiles: ["fullstack"]
    build:
      context: .
      dockerfile: python-agent/Dockerfile
    container_name: mvp-python-agent
    depends_on:
      control-plane:
        condition: service_healthy
      pc-agent-java:
        condition: service_started
    network_mode: "service:pc-agent-java"
    environment:
      MVP_BASE_URL: http://control-plane:8058
      MVP_AGENT_TOKEN: agent-dev-token
      MVP_NODE_ID: py-ai-local
      MVP_AGENT_PROFILE: ai-agent
      MVP_ALLOWED_WORKSPACE_PREFIXES: /workspace
      MVP_SANDBOX_BASE_URL: http://127.0.0.1:18080
      MVP_MEMORY_BACKEND: redis
      MVP_REDIS_URL: redis://:000000@redis:6379/0
      ARK_API_KEY: ${ARK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_CONFIG_PATH: ${LLM_CONFIG_PATH:-configs/doubao-seed-2.0-code-high-perf.json}
      WEB_TEMPLATE_PROMPT_MODE: ${WEB_TEMPLATE_PROMPT_MODE:-direct}
    volumes:
      - ./:/workspace

volumes:
  mysql-data:
  redis-data:
  control-plane-data:
