server:
  port: 8081
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: artifact-service

  datasource:
    url: ${ARTIFACT_DB_URL:jdbc:mysql://localhost:3306/artifact_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${ARTIFACT_DB_USER:root}
    password: ${ARTIFACT_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 512MB
      max-request-size: 512MB

# Artifact storage configuration
artifacts:
  storage:
    base-dir: ${ARTIFACT_STORAGE_DIR:./data/artifacts}

# Actuator — expose health and info endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Service-to-service communication (Requirement 11.2)
artifact-service:
  control-plane:
    url: ${CONTROL_PLANE_URL:http://localhost:8058}

logging:
  level:
    com.autocode.artifact: INFO
    org.springframework.web: WARN
