<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Amber Intelligence - 登录</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#855300",
        "primary-container": "#f59e0b",
        "on-primary": "#ffffff",
        "on-primary-container": "#2a1700",
        "surface": "#fff8f4",
        "surface-container": "#fbebdd",
        "surface-container-high": "#f5e6d7",
        "on-surface": "#221a12",
        "on-surface-variant": "#534434",
        "secondary-container": "#e9e1dd",
        "on-secondary-container": "#686361",
        "tertiary": "#00658b",
        "tertiary-container": "#c5e7ff",
        "on-tertiary-container": "#004966",
        "error": "#ba1a1a",
        "error-container": "#ffdad6",
        "outline": "#867461",
        "outline-variant": "#d8c3ad",
      },
      fontFamily: { sans: ['Public Sans', 'sans-serif'] },
    }
  }
}
</script>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  .filled { font-variation-settings: 'FILL' 1; }
  body { font-family: 'Public Sans', sans-serif; }
  .glass-panel {
    background: rgba(255,248,244,0.8);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(216,195,173,0.3);
  }
  .amber-gradient {
    background: linear-gradient(135deg, #f59e0b 0%, #855300 100%);
  }
  .fade-in {
    animation: fadeIn 0.6s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .pulse-dot {
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
</style>
</head>
<body class="bg-surface min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-sm fade-in">

  <!-- Logo & Brand -->
  <div class="text-center mb-8">
    <div class="w-16 h-16 mx-auto mb-4 rounded-2xl amber-gradient flex items-center justify-center shadow-lg">
      <span class="material-symbols-outlined filled text-white text-3xl">auto_awesome</span>
    </div>
    <h1 class="text-2xl font-bold text-on-surface tracking-tight">AutoCode</h1>
    <p class="text-sm text-on-surface-variant mt-1">AI 驱动的全栈交付平台</p>
  </div>

  <!-- Login Card -->
  <div class="glass-panel rounded-2xl p-6 shadow-xl">

    <!-- OAuth Buttons -->
    <div class="space-y-2">
      <!-- Google OAuth Button -->
      <button class="w-full flex items-center justify-center gap-3 px-4 py-3 bg-white hover:bg-gray-50 text-gray-700 rounded-xl font-medium text-sm transition-colors active:scale-[0.98] duration-150 shadow-md border border-gray-200">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        使用 Google 登录
      </button>

      <!-- GitHub OAuth Button -->
      <button class="w-full flex items-center justify-center gap-3 px-4 py-3 bg-[#24292f] hover:bg-[#1b1f23] text-white rounded-xl font-medium text-sm transition-colors active:scale-[0.98] duration-150 shadow-md">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
        </svg>
        使用 GitHub 登录
      </button>
    </div>

    <!-- Divider -->
    <div class="flex items-center gap-3 my-5">
      <div class="flex-1 h-px bg-outline-variant"></div>
      <span class="text-xs text-on-surface-variant font-medium">或使用邮箱</span>
      <div class="flex-1 h-px bg-outline-variant"></div>
    </div>

    <!-- Email Login Form -->
    <div class="space-y-3">
      <div>
        <label class="block text-xs font-medium text-on-surface-variant mb-1.5 ml-1">邮箱地址</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">mail</span>
          <input type="email" placeholder="your@email.com"
            class="w-full pl-10 pr-4 py-2.5 bg-surface rounded-xl text-sm text-on-surface border border-outline-variant/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 placeholder:text-outline transition-all">
        </div>
      </div>

      <!-- Verification Code -->
      <div>
        <label class="block text-xs font-medium text-on-surface-variant mb-1.5 ml-1">验证码</label>
        <div class="flex gap-2">
          <div class="relative flex-1">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">pin</span>
            <input type="text" placeholder="6 位验证码" maxlength="6"
              class="w-full pl-10 pr-4 py-2.5 bg-surface rounded-xl text-sm text-on-surface border border-outline-variant/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 placeholder:text-outline transition-all">
          </div>
          <button class="px-4 py-2.5 bg-primary-container text-on-primary-container rounded-xl text-sm font-medium hover:bg-primary-container/80 transition-colors active:scale-95 duration-150 whitespace-nowrap">
            发送验证码
          </button>
        </div>
      </div>

      <!-- Login Button -->
      <button class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-primary text-on-primary rounded-xl font-medium text-sm hover:bg-primary/90 transition-colors active:scale-[0.98] duration-150 shadow-md mt-2">
        <span class="material-symbols-outlined text-lg">login</span>
        登录 / 注册
      </button>
    </div>

    <!-- Hint -->
    <p class="text-[11px] text-on-surface-variant text-center mt-4 leading-relaxed">
      首次使用邮箱登录将自动创建账号<br>
      登录即表示同意 <a href="#" class="text-primary underline">服务条款</a> 和 <a href="#" class="text-primary underline">隐私政策</a>
    </p>
  </div>

  <!-- Connection Status -->
  <div class="mt-6 flex items-center justify-center gap-2">
    <div class="w-2 h-2 rounded-full bg-green-500 pulse-dot"></div>
    <span class="text-xs text-on-surface-variant">已连接 autocode.example.com</span>
  </div>

  <!-- Footer -->
  <div class="mt-8 text-center">
    <p class="text-[10px] text-outline">AutoCode v2.0 · Super Individual</p>
  </div>

</div>

</body>
</html>
