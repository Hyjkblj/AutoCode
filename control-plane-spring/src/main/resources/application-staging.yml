spring:
  datasource:
    url: ${MVP_DB_URL}
    username: ${MVP_DB_USERNAME}
    password: ${MVP_DB_PASSWORD}
  data:
    redis:
      host: ${MVP_REDIS_HOST}
      port: ${MVP_REDIS_PORT:6379}
      password: ${MVP_REDIS_PASSWORD}

mvp:
  auth:
    jwt:
      secret: ${MVP_JWT_SECRET}
  scheduler:
    mode: db
    lease-recover-interval-ms: 3000

logging:
  level:
    com.autocode: INFO
    org.springframework.web: WARN
