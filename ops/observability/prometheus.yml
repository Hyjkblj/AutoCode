global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090
        labels:
          service: prometheus

  - job_name: control-plane
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - control-plane:8058
        labels:
          service: control-plane

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093
        labels:
          service: alertmanager

  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets:
          - grafana:3000
        labels:
          service: grafana
