spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

approval:
  default-timeout-seconds: 60
  max-timeout-seconds: 300
  audit-enabled: false
  control-plane-url: http://localhost:8058

logging:
  level:
    com.autocode.approval: DEBUG
