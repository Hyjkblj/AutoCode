# 宿主机 Nginx 配置 — hyjkblj.online/code
# 放置在宿主机 /etc/nginx/conf.d/autocode.conf 或 include 到主配置

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

upstream autocode_gateway {
    server 127.0.0.1:8080;
    keepalive 16;
}

# 重定向 /code → /code/
server {
    listen 443 ssl;
    server_name hyjkblj.online;

    ssl_certificate     /etc/letsencrypt/live/hyjkblj.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hyjkblj.online/privkey.pem;

    # 其他已有 location 保持不变 ...
    # 例如:
    # location / { ... 其他站点 ... }

    # ── /code → 后端网关 ──
    location = /code {
        return 302 /code/;
    }

    location /code/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 去掉 /code 前缀，转发给 gateway
        rewrite ^/code/(.*) /$1 break;
        proxy_pass http://autocode_gateway;

        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }
}

# HTTP → HTTPS（如果没有已有的 80 server 块）
server {
    listen 80;
    server_name hyjkblj.online;
    return 301 https://$host$request_uri;
}
