services:
  mysql:
    image: mysql:8.4
    container_name: mvp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 000000
      MYSQL_DATABASE: mvp_codeops
      MYSQL_USER: mvp
      MYSQL_PASSWORD: 000000
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4
    container_name: mvp-redis
    command: ["redis-server", "--requirepass", "000000"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "000000", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
