spring:
  datasource:
    url: jdbc:h2:mem:artifact_test_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

artifacts:
  storage:
    base-dir: ${java.io.tmpdir}/artifact-service-test

# Disable the Control Plane health check in tests (no live Control Plane)
artifact-service:
  control-plane:
    health-check:
      enabled: false
