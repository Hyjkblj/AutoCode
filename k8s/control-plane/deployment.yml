apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: autocode
  labels:
    app: control-plane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      containers:
        - name: control-plane
          image: ghcr.io/hyjkblj/autocode/control-plane-spring:latest
          ports:
            - containerPort: 8058
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: MVP_DB_URL
              valueFrom:
                secretKeyRef:
                  name: autocode-secrets
                  key: mvp-db-url
            - name: MVP_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: autocode-secrets
                  key: mvp-db-username
            - name: MVP_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: autocode-secrets
                  key: mvp-db-password
            - name: MVP_REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: autocode-secrets
                  key: mvp-redis-host
            - name: MVP_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: autocode-secrets
                  key: mvp-redis-password
            - name: MVP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: autocode-secrets
                  key: mvp-jwt-secret
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8058
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8058
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
