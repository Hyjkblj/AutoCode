groups:
  - name: autocode-platform
    rules:
      - alert: ControlPlaneDown
        expr: up{job="control-plane"} == 0
        for: 2m
        labels:
          severity: critical
          service: control-plane
        annotations:
          summary: Control Plane unavailable
          description: Control Plane has not been reachable for more than 2 minutes.

      - alert: ControlPlaneHigh5xxRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{job="control-plane",status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_server_requests_seconds_count{job="control-plane"}[5m])), 1)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          service: control-plane
        annotations:
          summary: Control Plane 5xx rate is elevated
          description: The Control Plane 5xx response ratio has been above 5% for 5 minutes.

      - alert: ControlPlaneHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(http_server_requests_seconds_bucket{job="control-plane"}[5m]))
          ) > 1.5
        for: 10m
        labels:
          severity: warning
          service: control-plane
        annotations:
          summary: Control Plane P95 latency is high
          description: P95 request latency has been above 1.5 seconds for 10 minutes.

      - alert: ControlPlaneHeapPressure
        expr: |
          (
            max(jvm_memory_used_bytes{job="control-plane",area="heap"})
            /
            clamp_min(max(jvm_memory_max_bytes{job="control-plane",area="heap"}), 1)
          ) > 0.85
        for: 10m
        labels:
          severity: warning
          service: control-plane
        annotations:
          summary: Control Plane heap usage is high
          description: Heap utilization has been above 85% for 10 minutes.

  - name: autocode-pipeline
    rules:
      - alert: PipelineStageHighFailureRate
        expr: |
          (
            sum by (stage) (rate(pipeline_stage_total{status="failed"}[5m]))
            /
            clamp_min(sum by (stage) (rate(pipeline_stage_total[5m])), 1)
          ) > 0.10
        for: 5m
        labels:
          severity: warning
          service: python-agent
        annotations:
          summary: "Pipeline stage {{ $labels.stage }} failure rate > 10%"
          description: "Stage {{ $labels.stage }} has a failure rate above 10% for 5 minutes."

      - alert: PipelineStageSlowP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, stage) (rate(pipeline_stage_duration_seconds_bucket[5m]))
          ) > 30
        for: 10m
        labels:
          severity: warning
          service: python-agent
        annotations:
          summary: "Pipeline stage {{ $labels.stage }} P95 > 30s"
          description: "Stage {{ $labels.stage }} P95 latency has exceeded 30 seconds for 10 minutes."

      - alert: AgentDown
        expr: up{job="python-agent"} == 0
        for: 2m
        labels:
          severity: critical
          service: python-agent
        annotations:
          summary: Python Agent unavailable
          description: Python Agent has not been reachable for more than 2 minutes.

      - alert: GenerationHighFailureRate
        expr: |
          (
            sum(rate(generation_total{result="failed"}[5m]))
            /
            clamp_min(sum(rate(generation_total[5m])), 1)
          ) > 0.15
        for: 5m
        labels:
          severity: warning
          service: python-agent
        annotations:
          summary: Generation failure rate > 15%
          description: Code generation failure rate has been above 15% for 5 minutes.

      - alert: ValidationFailureSpike
        expr: sum(rate(validation_failure_total[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
          service: python-agent
        annotations:
          summary: Validation failure rate elevated
          description: Validation failure rate has been above 0.1/s for 5 minutes.

  - name: autocode-services
    rules:
      - alert: GatewayServiceDown
        expr: up{job="gateway-service"} == 0
        for: 1m
        labels:
          severity: critical
          service: gateway-service
        annotations:
          summary: Gateway Service is down
          description: Gateway Service has not been reachable for more than 1 minute.

      - alert: ApprovalServiceDown
        expr: up{job="approval-service"} == 0
        for: 1m
        labels:
          severity: critical
          service: approval-service
        annotations:
          summary: Approval Service is down
          description: Approval Service has not been reachable for more than 1 minute.

      - alert: ArtifactServiceDown
        expr: up{job="artifact-service"} == 0
        for: 1m
        labels:
          severity: critical
          service: artifact-service
        annotations:
          summary: Artifact Service is down
          description: Artifact Service has not been reachable for more than 1 minute.

      - alert: EventServiceDown
        expr: up{job="event-service"} == 0
        for: 1m
        labels:
          severity: critical
          service: event-service
        annotations:
          summary: Event Service is down
          description: Event Service has not been reachable for more than 1 minute.

      - alert: GatewayHigh5xxRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{job="gateway-service",status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_server_requests_seconds_count{job="gateway-service"}[5m])), 1)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          service: gateway-service
        annotations:
          summary: Gateway 5xx rate is elevated
          description: The Gateway 5xx response ratio has been above 5% for 5 minutes.

      - alert: HighApprovalTimeoutRate
        expr: rate(approval_timeout_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: approval-service
        annotations:
          summary: High approval timeout rate detected
          description: Approval timeout rate has been above 0.1/s for 5 minutes.

      - alert: EventDeduplicationBacklog
        expr: event_deduplication_pending > 1000
        for: 5m
        labels:
          severity: warning
          service: event-service
        annotations:
          summary: Event deduplication backlog growing
          description: Event deduplication pending count has exceeded 1000 for 5 minutes.
