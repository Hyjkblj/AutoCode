server:
  port: 8058
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: control-plane-spring
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.tracing.otlp.OtlpAutoConfiguration
  datasource:
    url: ${MVP_DB_URL:jdbc:mysql://localhost:3306/mvp_codeops?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${MVP_DB_USERNAME:root}
    password: ${MVP_DB_PASSWORD:changeme}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${MVP_REDIS_HOST:localhost}
      port: ${MVP_REDIS_PORT:6379}
      password: ${MVP_REDIS_PASSWORD:changeme}
      repositories:
        enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    rabbit:
      enabled: ${MVP_HEALTH_RABBIT_ENABLED:false}
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    enabled: ${MVP_TRACING_ENABLED:false}
    sampling:
      probability: ${MVP_TRACING_SAMPLING_PROBABILITY:0.1}

  otlp:
    tracing:
      endpoint: ${MVP_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

mvp:
  scheduler:
    # queue: poll from redis/rabbit/inmem queue (may cause re-enqueue churn when profile/lane mismatches)
    # db:    pick next eligible QUEUED task from DB (fair by created_at; avoids re-enqueue churn)
    mode: ${MVP_SCHEDULER_MODE:db}
    retry:
      base-backoff-seconds: ${MVP_SCHEDULER_RETRY_BASE_BACKOFF_SECONDS:5}
    lease-recover-interval-ms: ${MVP_SCHEDULER_LEASE_RECOVER_INTERVAL_MS:5000}
  auth:
    operator-token: ${MVP_OPERATOR_TOKEN:operator-dev-token}
    agent-token: ${MVP_AGENT_TOKEN:agent-dev-token}
    elevated-authorities: ${MVP_ELEVATED_AUTHORITIES:ROLE_ADMIN,ROLE_OPERATOR}
    jwt:
      secret: ${MVP_JWT_SECRET:autocode-dev-jwt-secret-which-is-at-least-32bytes}
      access-ttl-seconds: ${MVP_JWT_ACCESS_TTL_SECONDS:900}
      refresh-ttl-seconds: ${MVP_JWT_REFRESH_TTL_SECONDS:2592000}
    oauth:
      google:
        client-id: ${GOOGLE_CLIENT_ID:}
        client-secret: ${GOOGLE_CLIENT_SECRET:}
        redirect-uri: ${GOOGLE_REDIRECT_URI:https://hyjkblj.online/code/api/v1/auth/oauth/google/callback}
      github:
        client-id: ${GITHUB_CLIENT_ID:}
        client-secret: ${GITHUB_CLIENT_SECRET:}
        redirect-uri: ${GITHUB_REDIRECT_URI:https://hyjkblj.online/code/api/v1/auth/oauth/github/callback}
    email:
      smtp-host: ${SMTP_HOST:}
      from-address: ${SMTP_FROM:noreply@autocode.dev}
  mtls:
    required-for-agent: ${MVP_MTLS_REQUIRED_FOR_AGENT:false}
  queue:
    redis-key: mvp:task:queue
    lease-seconds: 60
    backend: redis
  task:
    max-concurrent: ${MVP_TASK_MAX_CONCURRENT:50}

artifacts:
  storage:
    base-dir: ${MVP_ARTIFACTS_BASE_DIR:./data/artifacts}
  hosting:
    # Extracted static site directory for hosted web artifacts.
    base-dir: ${MVP_ARTIFACTS_HOSTING_BASE_DIR:./data/artifacts-hosted}
    # Optional public origin override, e.g. https://autocode.example.com
    public-base-url: ${MVP_ARTIFACTS_HOSTING_PUBLIC_BASE_URL:}
  download:
    # Shared token for out-of-band links / strict mode.
    shared-token: ${MVP_ARTIFACTS_DOWNLOAD_SHARED_TOKEN:}
    # When true, authenticated users who already passed task-level ACL can preview/download without shared token.
    allow-authenticated-without-shared-token: ${MVP_ARTIFACTS_ALLOW_AUTHENTICATED_WITHOUT_SHARED_TOKEN:true}
  cleanup:
    enabled: ${MVP_ARTIFACTS_CLEANUP_ENABLED:true}
    retention-days: ${MVP_ARTIFACTS_CLEANUP_RETENTION_DAYS:30}

resilience4j:
  circuitbreaker:
    instances:
      redis:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
      database:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
